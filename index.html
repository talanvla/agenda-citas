<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predicar - Sistema Completo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Montserrat',sans-serif;margin:0;background:#f4f6f8;color:#333}
.hero{background:#111;padding:30px 20px}
.hero-images{max-width:1100px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.hero-images img{width:100%;height:180px;object-fit:cover;border-radius:12px}
.container{max-width:900px;margin:-40px auto 40px;background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1);padding:30px}
h1{text-align:center;margin-top:0}
label{font-weight:600;display:block;margin-top:15px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc}
button{margin-top:20px;background:#2d5bff;color:white;border:none;padding:14px;width:100%;border-radius:10px;cursor:pointer}
button:hover{background:#1f45cc}
.section{margin-top:40px}
.card{padding:15px;border-radius:10px;margin-bottom:10px}
.mecanico{background:#eef2ff}
.premium{background:#e8fff4}
</style>
</head>

<body>

<div class="hero">
<div class="hero-images">
<img src="https://images.unsplash.com/photo-1549924231-f129b911e442">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<img src="https://images.unsplash.com/photo-1542362567-b07e54358753">
</div>
</div>

<div class="container">

<h1>Agenda tu cita</h1>

<label>Servicio</label>
<select id="services"></select>

<label>Fecha</label>
<input type="date" id="date">

<label>Hora</label>
<select id="time"></select>

<label>Nombre</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Dirección</label>
<input type="text" id="direccion">

<label>Método de pago</label>
<select id="payment_method">
<option value="yape">Yape</option>
<option value="plin">Plin</option>
</select>

<label>Subir comprobante</label>
<input type="file" id="voucher">

<button onclick="book()">Agendar</button>

<p id="result"></p>

<div class="section">
<h2>💰 Cotizar servicio</h2>

<label>Tipo de servicio</label>
<select id="tipoServicio">
<option value="buscar">Buscar auto</option>
<option value="inspeccionar">Inspeccionar auto</option>
</select>

<label>Tipo de revisión</label>
<select id="nivelServicio">
<option value="basico">Solo escaneo</option>
<option value="mecanico">Mecánica + escaneo</option>
<option value="premium">Mecánica + electrónica + legal</option>
</select>

<label>Modelo</label>
<input id="modelo">

<label>Año</label>
<input type="number" id="anio">

<label>Presupuesto</label>
<input type="number" id="presupuesto">

<button onclick="cotizar()">Generar cotización</button>

<div id="cotizacionResultado"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

const SUPABASE_URL="https://lseahxqxcnmwfruoaubt.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZWFoeHF4Y25td2ZydW9hdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUzMjMyOTUsImV4cCI6MjA4MDg5OTI5NX0.9OsARsYTPXJkpoS4cjGr2Z3Qp_cf5vzesK-0K-S0XEQ";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
emailjs.init("UkGXNPeSB4mTuUiF1");

async function loadServices(){
const {data}=await db.from("services").select("*");
let html="";
data.forEach(s=>html+=`<option value="${s.id}">${s.name}</option>`);
document.getElementById("services").innerHTML=html;
}

async function loadTimes(){
const date=document.getElementById("date").value;
if(!date)return;
const {data:ap}=await db.from("appointments").select("*").eq("date",date);
const allTimes=["08:00","10:30","13:00","15:30"];
const occupied=ap.map(a=>a.time);
const free=allTimes.filter(t=>!occupied.includes(t));
let html="";
free.forEach(t=>html+=`<option>${t}</option>`);
document.getElementById("time").innerHTML=html;
}

async function book(){
const service_id=document.getElementById("services").value;
const client_name=document.getElementById("name").value;
const client_email=document.getElementById("email").value;
const direccion=document.getElementById("direccion").value;
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;

await db.from("appointments").insert({
service_id,client_name,client_email,direccion,date,time
});

document.getElementById("result").textContent="Cita registrada";
}

async function cotizar(){

const {data}=await db.from("appointments").select("*");

let citasSemana=data.length;
let citasMes=data.length;

let mecanico=180;
let premium=250;

let html=`
<h3>Disponibilidad</h3>
<p>Semana: ${citasSemana}</p>
<p>Mes: ${citasMes}</p>

<h3>Cotización</h3>

<div class="card mecanico">
<h4>Mecánico - S/ ${mecanico}</h4>
<p>Revisión mecánica + escaneo completo.</p>
</div>

<div class="card premium">
<h4>Premium - S/ ${premium}</h4>
<p>Mecánica + electrónica + legal completa.</p>
</div>
`;

document.getElementById("cotizacionResultado").innerHTML=html;
}

loadServices();
document.getElementById("date").onchange=loadTimes;

</script>

</body>
</html>
