<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predicar - Sistema Completo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Montserrat',sans-serif;margin:0;background:#f4f6f8;color:#333}
.hero{background:#111;padding:30px 20px}
.hero-images{max-width:1100px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.hero-images img{width:100%;height:180px;object-fit:cover;border-radius:12px}
.container{max-width:900px;margin:-40px auto 40px;background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1);padding:30px}
h1{text-align:center;margin-top:0}
label{font-weight:600;display:block;margin-top:15px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc}
button{margin-top:20px;background:#2d5bff;color:white;border:none;padding:14px;width:100%;border-radius:10px;cursor:pointer}
button:hover{background:#1f45cc}
.card{padding:15px;border-radius:10px;margin-top:15px;background:#fff}
.hidden{display:none}
</style>
</head>

<body>

<div class="hero">
<div class="hero-images">
<img src="imagen5.jpg">
<img src="imagen6.jpg">
<img src="imagen7.jpg">
<img src="imagen8.jpg">
</div>
</div>

<div class="container">

<h1>¿Qué deseas cotizar?</h1>

<p>Evaluación realizada por ingeniero mecatrónico con experiencia en diseño automotriz.</p>

<select id="tipo" onchange="cambiarFlujo()">
<option value="">Seleccionar</option>
<option value="busqueda">Búsqueda</option>
<option value="inspeccion">Inspección</option>
</select>

<!-- BUSQUEDA -->
<div id="busquedaBox" class="hidden">
<label>Nombre</label>
<input id="nombreBusqueda">

<label>Modelo del auto</label>
<input id="modeloBusqueda">

<label>Presupuesto (USD)</label>
<input type="number" id="presupuestoBusqueda">

<button onclick="cotizarBusqueda()">Cotizar búsqueda</button>
<div id="resultadoBusqueda"></div>
</div>

<!-- INSPECCION -->
<div id="inspeccionBox" class="hidden">
<p><b>Distritos sin costo adicional:</b><br>
San Isidro, San Borja, Miraflores, Surco, Jesús María, Magdalena</p>

<label>Modelo del auto</label>
<input id="modeloInspeccion">

<label>Fecha</label>
<input type="date" id="fechaInspeccion" onchange="mostrarHorarios()">

<div id="horarios"></div>
<div id="tablaComparativa"></div>
</div>

<!-- AGENDA ORIGINAL -->
<div id="agenda" class="hidden">
<h2>Agendar</h2>

<label>Fecha</label>
<input type="date" id="date">

<label>Hora</label>
<select id="time"></select>

<label>Nombre</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Dirección</label>
<input type="text" id="direccion">

<label>Método de pago</label>
<select id="payment_method">
<option value="yape">Yape</option>
<option value="plin">Plin</option>
</select>

<label>Subir comprobante</label>
<input type="file" id="voucher">

<img src="yape.png" style="width:200px;margin-top:10px;">

<button onclick="book()">Agendar</button>

<p id="result"></p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>

const SUPABASE_URL="https://lseahxqxcnmwfruoaubt.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZWFoeHF4Y25td2ZydW9hdWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUzMjMyOTUsImV4cCI6MjA4MDg5OTI5NX0.9OsARsYTPXJkpoS4cjGr2Z3Qp_cf5vzesK-0K-S0XEQ";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function cambiarFlujo(){
let tipo=document.getElementById('tipo').value;
document.getElementById('busquedaBox').classList.add('hidden');
document.getElementById('inspeccionBox').classList.add('hidden');
document.getElementById('agenda').classList.add('hidden');

if(tipo==='busqueda') document.getElementById('busquedaBox').classList.remove('hidden');
if(tipo==='inspeccion') document.getElementById('inspeccionBox').classList.remove('hidden');
}

function cotizarBusqueda(){
let presupuesto=parseFloat(document.getElementById('presupuestoBusqueda').value);
if(!presupuesto || presupuesto < 25000){
document.getElementById('resultadoBusqueda').innerHTML='<p>Mínimo $25,000</p>';
return;
}

let precio=Math.min(presupuesto*0.025,690).toFixed(2);
document.getElementById('resultadoBusqueda').innerHTML=`
<div class="card">
<p>Precio: USD ${precio}</p>
<button onclick="mostrarAgendaDesdeBusqueda()">Agendar</button>
</div>`;
}

async function mostrarHorarios(){
let fecha=document.getElementById('fechaInspeccion').value;
if(!fecha) return;

const allTimes=["08:00","10:30","13:00","15:30"];

const {data}=await db.from("appointments").select("time").eq("date",fecha);

let ocupados=(data||[]).map(a=>a.time);
let disponibles=allTimes.filter(t=>!ocupados.includes(t));

// llenar select agenda
let select=document.getElementById('time');
select.innerHTML=disponibles.map(t=>`<option>${t}</option>`).join('');

// mostrar tabla
mostrarComparativa();
}

function mostrarComparativa(){
document.getElementById('tablaComparativa').innerHTML=`
<table style="width:100%;margin-top:15px;text-align:center">
<tr><th>Servicio</th><th>Básico</th><th>Mecánico</th><th>Premium</th></tr>
<tr><td>Escaneo</td><td>✔</td><td>✔</td><td>✔</td></tr>
<tr><td>Mecánica</td><td>—</td><td>✔</td><td>✔</td></tr>
<tr><td>Legal</td><td>—</td><td>—</td><td>✔</td></tr>
<tr><td>Precio</td><td>S/230</td><td>S/260</td><td>S/360</td></tr>
<tr>
<td></td>
<td><button onclick="mostrarAgendaDesdeInspeccion()">Elegir</button></td>
<td><button onclick="mostrarAgendaDesdeInspeccion()">Elegir</button></td>
<td><button onclick="mostrarAgendaDesdeInspeccion()">Elegir</button></td>
</tr>
</table>`;
}

function mostrarAgendaDesdeInspeccion(){
// copiar fecha
let fecha=document.getElementById('fechaInspeccion').value;
document.getElementById('date').value=fecha;

mostrarAgenda();
}

function mostrarAgendaDesdeBusqueda(){
mostrarAgenda();
}

function mostrarAgenda(){
document.getElementById('agenda').classList.remove('hidden');
document.getElementById('agenda').scrollIntoView({behavior:'smooth'});
}

</script>

</body>
</html>
